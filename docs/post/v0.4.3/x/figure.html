<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1600">
<title>Agent OS Kernel — Architecture (X/Twitter)</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    background: #f0f0f0;
    font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
  }

  .diagram {
    width: 1600px;
    height: 900px;
    background: #ffffff;
    border-radius: 12px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: space-between;
    padding: 52px 80px 44px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.06);
  }

  .title {
    font-size: 30px;
    font-weight: 700;
    color: #334155;
    letter-spacing: 2.5px;
    text-align: center;
  }
  .title span { color: #166534; }

  .layers {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    width: 100%;
    padding: 16px 0;
  }

  .layer {
    display: flex;
    flex-direction: column;
    align-items: center;
    border-radius: 20px;
  }

  .layer-label {
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  .layer-sublabel {
    font-weight: 400;
    letter-spacing: 0.3px;
    opacity: 0.75;
  }

  .world {
    border: 3px dashed #9333ea;
    background: #f2e8ef;
    padding: 28px 48px 26px;
    border-radius: 28px;
  }
  .world > .layer-header { align-self: flex-end; margin-bottom: 14px; }
  .world .layer-label { color: #7e22ce; font-size: 17px; }
  .world .layer-sublabel { color: #7e22ce; font-size: 14px; }

  .providers {
    border: 3px dashed #3b82f6;
    background: #e4edf9;
    padding: 26px 44px 24px;
    border-radius: 24px;
    width: 100%;
  }
  .providers > .layer-header { align-self: flex-end; margin-bottom: 14px; }
  .providers .layer-label { color: #1e40af; font-size: 17px; }
  .providers .layer-sublabel { color: #1e40af; font-size: 14px; }

  .gate {
    border: 3px solid #166534;
    background: #dfeee8;
    padding: 26px 42px 24px;
    border-radius: 20px;
    width: 100%;
  }
  .gate > .layer-header { text-align: center; margin-bottom: 16px; }
  .gate .layer-label { color: #166534; font-size: 20px; }

  .agent {
    border: 3px dashed #b45309;
    background: #fffaf0;
    padding: 18px 36px;
    border-radius: 14px;
  }
  .agent .layer-label { color: #b45309; font-size: 18px; }

  .chips { display: flex; gap: 14px; justify-content: center; flex-wrap: wrap; }

  .chip {
    background: #ffffff;
    border-radius: 10px;
    padding: 8px 22px;
    font-size: 16px;
    font-weight: 600;
    letter-spacing: 0.3px;
  }

  .chip-agent { border: 2px solid #d4a574; color: #92400e; }
  .chip-gate { border: 2px solid #166534; color: #166534; }

  .gate-chips { display: flex; gap: 14px; justify-content: center; margin-bottom: 18px; }

  .invariants {
    display: flex;
    justify-content: center;
    gap: 48px;
    font-size: 18px;
    color: #64748b;
  }

  .invariant { display: flex; align-items: center; gap: 8px; }
  .invariant-icon { font-size: 20px; }
  .invariant strong { color: #475569; font-weight: 600; }

  .layer-header { display: flex; align-items: baseline; gap: 10px; }
</style>
</head>
<body>

<div class="diagram">
  <div class="title">AGENT OS KERNEL &mdash; <span>Architecture</span></div>

  <div class="layers">
    <div class="layer world">
      <div class="layer-header">
        <span class="layer-label">World</span>
        <span class="layer-sublabel">&ensp;Files &middot; APIs &middot; Databases</span>
      </div>
      <div class="layer providers">
        <div class="layer-header">
          <span class="layer-label">Providers</span>
          <span class="layer-sublabel">&ensp;Filesystem &middot; HTTP &middot; MCP &middot; Process</span>
        </div>
        <div class="layer gate">
          <div class="layer-header" style="justify-content:center;">
            <span class="layer-label">Kernel&ensp;(Gate)</span>
          </div>
          <div class="gate-chips">
            <div class="chip chip-gate">Policy</div>
            <div class="chip chip-gate">kernel.submit()</div>
            <div class="chip chip-gate">Audit Log</div>
          </div>
          <div class="layer agent" style="align-self:center;">
            <div style="display:flex;align-items:center;gap:20px;">
              <span class="layer-label">Agent</span>
              <div class="chips">
                <div class="chip chip-agent">LLM</div>
                <div class="chip chip-agent">ToolDef</div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="invariants">
    <div class="invariant">
      <span class="invariant-icon">&#128274;</span>
      <strong>All access through Gate</strong>
    </div>
    <div class="invariant">
      <span class="invariant-icon">&#128683;</span>
      <strong>Default deny</strong>
    </div>
    <div class="invariant">
      <span class="invariant-icon">&#128221;</span>
      <strong>No silent actions</strong>
    </div>
  </div>
</div>

</body>
</html>
