<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1200">
<title>Agent OS Kernel — Architecture</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    background: #f0f0f0;
    font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
  }

  .diagram {
    width: 1200px;
    height: 627px;
    background: #ffffff;
    border-radius: 12px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: space-between;
    padding: 36px 60px 30px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.06);
  }

  /* Title */
  .title {
    font-size: 22px;
    font-weight: 700;
    color: #334155;
    letter-spacing: 2px;
    text-align: center;
  }
  .title span {
    color: #166534;
  }

  /* Concentric layers */
  .layers {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    width: 100%;
    padding: 12px 0;
  }

  .layer {
    display: flex;
    flex-direction: column;
    align-items: center;
    border-radius: 20px;
    position: relative;
  }

  .layer-label {
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  .layer-sublabel {
    font-weight: 400;
    letter-spacing: 0.3px;
    opacity: 0.75;
  }

  /* World — outermost */
  .world {
    border: 2.5px dashed #9333ea;
    background: #f2e8ef;
    padding: 22px 36px 20px;
    border-radius: 24px;
  }
  .world > .layer-header {
    align-self: flex-end;
    margin-bottom: 10px;
  }
  .world .layer-label { color: #7e22ce; font-size: 13px; }
  .world .layer-sublabel { color: #7e22ce; font-size: 11px; }

  /* Providers */
  .providers {
    border: 2.5px dashed #3b82f6;
    background: #e4edf9;
    padding: 20px 34px 18px;
    border-radius: 20px;
    width: 100%;
  }
  .providers > .layer-header {
    align-self: flex-end;
    margin-bottom: 10px;
  }
  .providers .layer-label { color: #1e40af; font-size: 13px; }
  .providers .layer-sublabel { color: #1e40af; font-size: 11px; }

  /* Gate / Kernel */
  .gate {
    border: 2.5px solid #166534;
    background: #dfeee8;
    padding: 20px 32px 18px;
    border-radius: 16px;
    width: 100%;
  }
  .gate > .layer-header {
    text-align: center;
    margin-bottom: 12px;
  }
  .gate .layer-label { color: #166534; font-size: 15px; }

  /* Agent — innermost */
  .agent {
    border: 2.5px dashed #b45309;
    background: #fffaf0;
    padding: 14px 28px;
    border-radius: 12px;
  }
  .agent .layer-label { color: #b45309; font-size: 14px; }

  /* Sub-component chips */
  .chips {
    display: flex;
    gap: 10px;
    justify-content: center;
    flex-wrap: wrap;
  }

  .chip {
    background: #ffffff;
    border-radius: 8px;
    padding: 6px 16px;
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.3px;
  }

  .chip-agent {
    border: 1.5px solid #d4a574;
    color: #92400e;
  }

  .chip-gate {
    border: 1.5px solid #166534;
    color: #166534;
  }

  /* Gate chips row */
  .gate-chips {
    display: flex;
    gap: 10px;
    justify-content: center;
    margin-bottom: 14px;
  }

  /* Invariants footer */
  .invariants {
    display: flex;
    justify-content: center;
    gap: 36px;
    font-size: 14px;
    color: #64748b;
  }

  .invariant {
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .invariant-icon {
    font-size: 16px;
  }

  .invariant strong {
    color: #475569;
    font-weight: 600;
  }

  /* Layer header */
  .layer-header {
    display: flex;
    align-items: baseline;
    gap: 8px;
  }
</style>
</head>
<body>

<div class="diagram">

  <!-- Title -->
  <div class="title">AGENT OS KERNEL &mdash; <span>Architecture</span></div>

  <!-- Concentric Layers -->
  <div class="layers">
    <!-- World (outermost) -->
    <div class="layer world">
      <div class="layer-header">
        <span class="layer-label">World</span>
        <span class="layer-sublabel">&ensp;Files &middot; APIs &middot; Databases</span>
      </div>

      <!-- Providers -->
      <div class="layer providers">
        <div class="layer-header">
          <span class="layer-label">Providers</span>
          <span class="layer-sublabel">&ensp;Filesystem &middot; HTTP &middot; MCP &middot; Process</span>
        </div>

        <!-- Gate / Kernel -->
        <div class="layer gate">
          <div class="layer-header" style="justify-content:center;">
            <span class="layer-label">Kernel&ensp;(Gate)</span>
          </div>

          <!-- Gate sub-components -->
          <div class="gate-chips">
            <div class="chip chip-gate">Policy</div>
            <div class="chip chip-gate">kernel.submit()</div>
            <div class="chip chip-gate">Audit Log</div>
          </div>

          <!-- Agent (innermost) -->
          <div class="layer agent" style="align-self:center;">
            <div style="display:flex;align-items:center;gap:16px;">
              <span class="layer-label">Agent</span>
              <div class="chips">
                <div class="chip chip-agent">LLM</div>
                <div class="chip chip-agent">ToolDef</div>
              </div>
            </div>
          </div>

        </div>
      </div>
    </div>
  </div>

  <!-- Invariants -->
  <div class="invariants">
    <div class="invariant">
      <span class="invariant-icon">&#128274;</span>
      <strong>All access through Gate</strong>
    </div>
    <div class="invariant">
      <span class="invariant-icon">&#128683;</span>
      <strong>Default deny</strong>
    </div>
    <div class="invariant">
      <span class="invariant-icon">&#128221;</span>
      <strong>No silent actions</strong>
    </div>
  </div>

</div>

</body>
</html>
